name: Android CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Lint
        run: ./gradlew lintRelease --no-daemon
      - name: Unit tests
        run: ./gradlew testReleaseUnitTest --no-daemon
      - name: Assemble release
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExerciseTracker-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
      - name: AAPT2 parity check (if reference present)
        run: |
          if [ -f ../reference/phone-installed.apk ]; then
            bash ../tools/aapt2-parity.sh ../reference/phone-installed.apk app/build/outputs/apk/release/*.apk || true
          else
            echo "Reference APK not in repo — skipping aapt2 parity"
          fi
